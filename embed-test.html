<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XnaFiddle Embed Test</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #f0f0f0;
            font-family: 'Segoe UI', sans-serif;
        }
        h1 { font-size: 20px; margin: 0 0 12px; }
        p  { font-size: 14px; color: #555; margin: 0 0 20px; }
        iframe {
            display: block;
            width: 600px;
            height: 400px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>XnaFiddle Embed Test</h1>
    <p>This page embeds XnaFiddle in canvas-only mode via <code>?embed=true</code>.</p>
    <iframe src="https://localhost:60440/?embed=true&example=AposShapes" allowfullscreen></iframe>
</body>
</html>
